<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats — Chronicle of the Undead</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ash: #0a0907;
  --stone: #111009;
  --ember: #c8792a;
  --ember-dim: #7a4418;
  --ember-bright: #e8a050;
  --bone: #c4b48a;
  --bone-dim: #7a6e52;
  --bone-muted: #3d3828;
  --seam: rgba(196,180,138,0.13);
  --green-stat: #4a9c6e;
}

html, body {
  background: #191919;

  font-family: 'IM Fell English', Georgia, serif;
  color: var(--bone);
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 12px;
  overflow: hidden;
}

.wrap {
  width: 100%;
  max-width: 680px;
  background: var(--stone);
  border: 1px solid var(--seam);
  padding: 24px;
  position: relative;
}

.rune-tl, .rune-tr, .rune-bl, .rune-br {
  position: absolute; width: 14px; height: 14px;
}
.rune-tl { top: 6px; left: 6px;   border-top: 1px solid var(--ember-dim); border-left: 1px solid var(--ember-dim); }
.rune-tr { top: 6px; right: 6px;  border-top: 1px solid var(--ember-dim); border-right: 1px solid var(--ember-dim); }
.rune-bl { bottom: 6px; left: 6px;  border-bottom: 1px solid var(--ember-dim); border-left: 1px solid var(--ember-dim); }
.rune-br { bottom: 6px; right: 6px; border-bottom: 1px solid var(--ember-dim); border-right: 1px solid var(--ember-dim); }

.header {
  text-align: center;
  margin-bottom: 20px;
}

.char-name {
  font-family: 'Cinzel Decorative', serif;
  font-size: 18px;
  color: var(--ember-bright);
  letter-spacing: 2px;
  margin-bottom: 4px;
}

.char-rank {
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--ember-dim);
  text-transform: uppercase;
  margin-bottom: 8px;
}

.xp-bar-text {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  color: var(--bone-dim);
  letter-spacing: 1px;
}

.content {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
  align-items: flex-start;
}

@media (max-width: 500px) {
  .content { grid-template-columns: 1fr; }
}

.radar-wrap {
  display: flex;
  justify-content: center;
}

.stats-list { display: flex; flex-direction: column; gap: 12px; }

.stat-row { display: flex; flex-direction: column; gap: 4px; }

.stat-head {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
}

.stat-name {
  font-family: 'Cinzel', serif;
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--bone-dim);
  text-transform: uppercase;
}

.stat-val {
  font-size: 12px;
  color: var(--bone);
}

.stat-bar-bg {
  height: 4px;
  background: #0d0b08;
  border: 1px solid var(--bone-muted);
  overflow: hidden;
}

.stat-bar-fill {
  height: 100%;
  opacity: 0.8;
  transition: width 1s ease;
}

.loading {
  text-align: center;
  font-family: 'Cinzel', serif;
  font-size: 10px;
  letter-spacing: 3px;
  color: var(--ember-dim);
  text-transform: uppercase;
  padding: 40px;
}

.sect-label {
  font-family: 'Cinzel', serif;
  font-size: 7px;
  letter-spacing: 4px;
  color: var(--ember-dim);
  text-transform: uppercase;
  margin-bottom: 16px;
  display: flex;
  align-items: flex-start;
  gap: 8px;
}
.sect-label::after { content: ''; flex: 1; height: 1px; background: var(--seam); }

.epitaph {
  text-align: center;
  margin-top: 20px;
  font-family: 'Cinzel', serif;
  font-size: 7px;
  letter-spacing: 4px;
  color: var(--bone-muted);
  text-transform: uppercase;
}
</style>
</head>
<body>
<div class="wrap">
  <div class="rune-tl"></div><div class="rune-tr"></div>
  <div class="rune-bl"></div><div class="rune-br"></div>

  <div class="header">
    <div class="char-name">PACO</div>
    <div class="char-rank" id="rank-text">Cargando...</div>
    <div class="xp-bar-text" id="xp-bar-text">—</div>
  </div>

  <div class="sect-label">Radar de Stats</div>

  <div id="loading" class="loading">Invocando el alma del personaje...</div>

  <div id="main-content" style="display:none;">
    <div class="content">
      <div class="radar-wrap">
        <canvas id="radar" width="220" height="220"></canvas>
      </div>
      <div class="stats-list" id="stats-list"></div>
    </div>
  </div>

  <div class="epitaph">Praise the Sun · Kindle the Ember · Link the Fire</div>
</div>

<script>
const STAT_CONFIG = [
  { key: 'fisico',    label: 'Físico',    color: '#8c2020', max: 500 },
  { key: 'mente',     label: 'Mente',     color: '#3a5c80', max: 500 },
  { key: 'nutricion', label: 'Nutrición', color: '#3a5c30', max: 500 },
  { key: 'habitos',   label: 'Hábitos',   color: '#c8792a', max: 500 },
  { key: 'negocio',   label: 'Negocio',   color: '#7a6030', max: 500 },
];

async function loadStats() {
  try {
    const res = await fetch('/api/stats');
    const data = await res.json();
    renderDashboard(data);
  } catch(e) {
    document.getElementById('loading').textContent = 'Error al cargar los datos.';
  }
}

function renderDashboard(data) {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';

  document.getElementById('rank-text').textContent =
    `${data.rango || '💀 Iniciado'} · Nivel ${data.nivel || 1}`;
  document.getElementById('xp-bar-text').textContent = data.barraXP || '';

  buildStatsList(data);
  drawRadar(data);
}

function buildStatsList(data) {
  const list = document.getElementById('stats-list');
  list.innerHTML = '';
  STAT_CONFIG.forEach(s => {
    const val = data[s.key] || 0;
    const pct = Math.min(Math.round((val / s.max) * 100), 100);
    list.innerHTML += `
      <div class="stat-row">
        <div class="stat-head">
          <span class="stat-name">${s.label}</span>
          <span class="stat-val">${val}</span>
        </div>
        <div class="stat-bar-bg">
          <div class="stat-bar-fill" style="width:${pct}%;background:${s.color};"></div>
        </div>
      </div>`;
  });
}

function drawRadar(data) {
  const canvas = document.getElementById('radar');
  const ctx = canvas.getContext('2d');
  const W = 220, H = 220, cx = 110, cy = 115, R = 80;
  const N = STAT_CONFIG.length;

  function angle(i) { return (Math.PI * 2 * i / N) - Math.PI / 2; }
  function pt(i, r) { return [cx + r * Math.cos(angle(i)), cy + r * Math.sin(angle(i))]; }

  ctx.clearRect(0, 0, W, H);

  for (let ring = 1; ring <= 4; ring++) {
    const r = R * ring / 4;
    ctx.beginPath();
    for (let i = 0; i < N; i++) {
      const [x, y] = pt(i, r);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.strokeStyle = 'rgba(196,180,138,0.1)';
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  for (let i = 0; i < N; i++) {
    const [x, y] = pt(i, R);
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(x, y);
    ctx.strokeStyle = 'rgba(196,180,138,0.1)';
    ctx.lineWidth = 0.5;
    ctx.stroke();

    const [lx, ly] = pt(i, R + 16);
    ctx.fillStyle = '#7a6e52';
    ctx.font = '9px Cinzel, serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(STAT_CONFIG[i].label, lx, ly);
  }

  const values = STAT_CONFIG.map(s => Math.min((data[s.key] || 0) / s.max, 1));

  ctx.beginPath();
  for (let i = 0; i < N; i++) {
    const r = R * Math.max(values[i], 0.04);
    const [x, y] = pt(i, r);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fillStyle = 'rgba(74,156,110,0.15)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(74,156,110,0.7)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
}

loadStats();
</script>
</body>
</html>
